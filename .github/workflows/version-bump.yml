name: Version Bump

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  version-bump:
    if: github.repository == 'QlikSenseStudios/qs-ext-jump-start'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          # Use GITHUB_TOKEN — bump commit intentionally does not trigger CI
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Resolve version bump type from PR label
        id: bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the PR that was merged into this push by matching the merge commit SHA.
          # The GitHub API search endpoint returns PRs whose merge_commit_sha matches.
          SHA="${{ github.sha }}"
          REPO="${{ github.repository }}"

          PR_LABELS=$(gh api \
            "repos/${REPO}/commits/${SHA}/pulls" \
            --jq '[.[0].labels[].name] | join(",")' 2>/dev/null || echo "")

          echo "PR labels: $PR_LABELS"

          if echo "$PR_LABELS" | grep -q "version:major"; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$PR_LABELS" | grep -q "version:minor"; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          elif echo "$PR_LABELS" | grep -q "version:patch"; then
            echo "type=patch" >> "$GITHUB_OUTPUT"
          else
            echo "type=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version and create PR
        if: steps.bump.outputs.type != 'none'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUMP_TYPE="${{ steps.bump.outputs.type }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          npm version "$BUMP_TYPE" --no-git-tag-version --ignore-scripts
          NEW_VERSION=$(node -p "require('./package.json').version")
          npm install --package-lock-only --ignore-scripts

          BRANCH_NAME="chore/version-bump-${NEW_VERSION}"

          # Delete existing branch if it exists
          git push origin --delete "$BRANCH_NAME" 2>/dev/null || true

          git checkout -b "$BRANCH_NAME"
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${NEW_VERSION}"
          git push origin "$BRANCH_NAME"

          # Create PR and capture PR number from output
          PR_OUTPUT=$(gh pr create \
            --title "chore: bump version to ${NEW_VERSION}" \
            --body "Automated version bump" \
            --base main 2>&1)

          # Extract PR number from output (format: "https://github.com/owner/repo/pull/NUMBER")
          PR_NUMBER=$(echo "$PR_OUTPUT" | grep -oP 'pull/\K[0-9]+' | head -1)

          if [ -z "$PR_NUMBER" ]; then
            echo "Failed to create PR. Output: $PR_OUTPUT"
            exit 1
          fi

          gh pr merge "$PR_NUMBER" --auto --squash
